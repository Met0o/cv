{% assign skills = site.data.data.skills %}
{% if skills %}
<section class="skills-section section" id="capabilities">

  <div class="section-kicker">Toolkit / 04</div>
  <h2 class="section-title">Core skills</h2>

  <div class="skillset">

    {% for skill in skills.toolset %}
    <div class="item">

      <span class="skill-index">0{{ forloop.index }}</span>
      <h3 class="level-title">{{ skill.name }}</h3>

    </div><!--//item-->
    {% endfor %}

  </div>

</section><!--//skills-section-->
{% endif %}
