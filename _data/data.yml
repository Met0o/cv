projects:
    title: Projects
    intro: >
        Selected projects from my work, each highlighting a distinct system or capability built as part of a broader AI and data platform strategy.
    assignments:
      - title: MCP Agent Platform
        tagline: >-
          Architected a production FastAPI and Pydantic AI platform connecting enterprise agents to business APIs through the Model Context Protocol (MCP), with Azure-hosted models and authenticated, per-user tool access. Built AG-UI/SSE streaming, human-in-the-loop elicitation, resource-backed skill discovery, hybrid retrieval, and persistent multi-session chat workflows. Engineered context and tool-result guardrails, normalized provider failures, health canaries, usage analytics, OpenTelemetry tracing, and Prometheus metrics. Delivered containerized Helm deployments with automated testing, code-quality gates, and dependency and image security scanning.

      - title: AI Diagnostics & Evaluation Service
        tagline: >-
          Designed an event-driven AI diagnostics service that consumes Azure Service Bus workloads, validates complex domain payloads, and generates closed-schema analytical reports with Pydantic AI and Azure-hosted reasoning models. Built secure MCP-based document hydration with OAuth token caching, structured output validation, attachment traceability, replica-aware rate limiting, bounded concurrency, message lock renewal, retry classification, and graceful workload draining. Added MLflow and Databricks tracing with asynchronous LLM-based quality evaluation, plus FastAPI health probes, Docker delivery, CI quality gates, and unit and live end-to-end test suites.

      - title: AI Agent Endpoint (March 2025 - June 2025)
        tagline: "Developed a production-grade multi-agent helpdesk automation service integrating Azure OpenAI, MongoDB Atlas, and SendGrid API.
        Built an asynchronous FastAPI endpoint coordinating Analysis, Service, and Mail agents via Autogen to interpret queries, retrieve context, and trigger escalation workflows.
        Implemented hybrid retrieval combining Vector Search and Atlas Search through LangChain and Motor for relevant, low-latency document access.
        Integrated templated SendGrid notifications with validated environment secrets to ensure secure, deterministic case handoffs.
        Reinforced reliability with structured logging, health probes, async metrics, and conversation persistence.
        Delivered an intelligent, self-contained endpoint enabling automatic classification, routing, and escalation of helpdesk requests with consistent, monitored performance."

      - title: Forecasting Platform (Jan 2025 - March 2025)
        tagline: "Developed a large-scale forecasting system modeling written premiums by country and insurance class using Azure Databricks and Prophet/GLM models.
        The platform yielded thousands of time-series combinations through permutations of model type, macroeconomic regressors, and cross-validation folds with hyperparameter grid search.
        Automated model selection and MLflow experiment tracking ensured transparency and reproducibility.
        Parallelized execution with Python multiprocessing accelerated training and forecasting, while validation logic handled sparse and outlier-prone data.
        Produced quarterly and yearly forecasts with metadata integrated into Databricks and downstream BI pipelines, delivering reliable, scalable insights for actuarial analysis."

      - title: Document Embedding & Hybrid Search Service (Sep 2024 - Dec 2024)
        tagline: "Built a retrieval-augmented generation (RAG) platform delivering grounded enterprise Q&A over internal document collections, powering multiple learning assistants across our GRC portfolio.
        Designed an ensemble retriever combining MongoDB Atlas Vector Search, BM25, and LLM-based contextual compression through LangChain to balance precision and recall.
        Implemented evaluation with TruLens for groundedness and answer relevance, storing metrics asynchronously in PostgreSQL.
        Exposed a FastAPI endpoint that orchestrates Azure OpenAI models with persistent conversation memory, structured logging, and environment-based configuration.
        Benchmarked performance using a dedicated latency-and-correctness harness on regulatory domain datasets, enabling transparent, production-grade RAG performance monitoring.
        Shipped the system with Docker including Prometheus and Grafana for observability."

      - title: Agent Marking Service (April 2024 - Aug 2024)
        tagline: "Developed and deployed an AI-powered exam marking service that integrates a Streamlit user interface with a FastAPI backend orchestrating Azure OpenAI models.
        Designed an agentic grading pipeline using Autogen to assemble context from exams, marking guides, and exemplar responses, generating structured grades and feedback stored in MongoDB.
        Implemented asynchronous background job processing, structured logging, and readiness/health probes for reliable operation.
        Delivered hardened Docker containers with multi-stage builds, digest-pinned Helm deployments, and environment-sourced secrets managed via Azure Container Registry.
        Automated builds and Helm chart publishing through GitHub Actions, ensuring full local-to-cloud parity and production-grade delivery."

      - title: OCR Automation project (Sept 2023 - Feb 2024)
        tagline: "Architected an automated invoice processing platform combining Azure OCR engines, Adobe REST APIs, and Generative AI for document intelligence.
        Built Flask-based APIs orchestrating OCR and OpenAI Assistant outputs into unified, validated JSON payloads for enhanced data accuracy.
        Designed a Python backend handling asynchronous data transformations, structured logging, and reliable ingestion into Supabase.
        Implemented text-based document classification and integrity checks to support downstream analytics pipelines.
        Delivered a fully serverless, cloud-native system improving processing efficiency and operational transparency across automation workflows."

      - title: RAG Web Application (Jun 2023 - Aug 2023) - Link
        link: "https://github.com/Met0o/Papyrus"
        tagline: "Developed a Flask and Streamlit-based application for extracting and interacting with data from vectorized documents using transformer models and langchain. 
        Optimized for performance in Docker with GPU support, the project features integration with pgvector database and efficient model utilization, including Stable-Platypus2-13B and Llama-2-7b-chat-hf. 
        Managed full-stack implementation from data processing and server setup to user interface design, ensuring compatibility with various hardware specifications and deploying effective debugging strategies"

      - title: Risk Analysis Application project (Feb 2023 - May 2023) - Link
        link: "https://github.com/Met0o/data_ingestion"
        tagline: "Designed and developed Postgres deployment and configuration codebase including the underlying data layer of a risk assessment application. 
        Developed multiple custom connectors using Python, 
        supporting dynamic data ingestion from various sources (APIs, local & remote files, etc.). Created consolidated data model through dynamic and materialized views.
        Fully automated the CI/CD deployment pipeline using Docker and Github Workflows. Achieved complete database and data-layer integration as a microservice within a Kubernetes cluster."

      - title: Anomaly Detection Application project (Oct 2022 - Feb 2023)
        tagline: "Deployed project infrastructure using Docker, Postgres, Prometheus, Grafana and MLFlow.
        Researched anomaly detection methods based on confidence and probability intervals with detection of anomalous groups (Entropy, Wavelet transforms, Isolation Forest, Prophet)."

      - title: Kafka-Streaming project (Oct 2022) - Link
        link: "https://github.com/Met0o/Kafka-Streaming"
        tagline: "Developed Kafka data-streaming solution.
        Designed and implemented a real-time data pipeline. Integrated Spark Streaming with Kafka for data ingestion. Applied data cleaning and sentiment analysis using TextBlob. 
        Stored processed data in Atlas MongoDB cloud."

      - title: Smart Alignment project (Aug 2022 - Oct 2022)
        tagline: "Developed preliminary dataset and analyzed semantic similarity of key product features using sentence transformer model (SBERT), thus improving KPI automation process."

      - title: Customer churn analysis case study (July 2022 - Aug 2022)
        tagline: "Created end-to-end project design and implementation. Developed novel data model sourcing data from 5 systems (Redis, ChargeBee, Salesforce, MongoDB, Postgres) using Azure Synapse. 
        Iterated through multiple classification models and developed R-Shiny web application for interactive customer churn scoring."
  
      - title: Automatic Insights Recommendation project (May 2022 - Aug 2022)
        tagline: "Developed TensorFlow multiclass classification model with hyperparameter optimization. Integrated model tracking and testing with MLFlow."

      - title: Autofill OKRs project (Jan 2022 - Mar 2022)
        tagline: "Developed language detection inference pipeline, used LIME for explainability of a large TensorFlow multiclass classification model. 
        Developed complex data model sourcing data off production systems using Azure Synapse, AZDL and PGDB. Used Grafana to develop custom metrics and KPIS for tracking model performance in production."    

      - title: Equity Trading Forecast Analysis (Dec 2021) - Link
        link: "https://rpubs.com/MetodiSimeonov/Superlearner"
        tagline: "Worked on a POC consultancy project for a FinTech company where I developed a forecasting solution for predicting equity trading volumes. 
        Used variety of nested and ensembled models in R to process multiple time series in parallel."

      - title: Nestted Forecaster Web App (Oct 2021) - Link
        link: "https://metodisimeonov.shinyapps.io/Nested_Forecaster/"
        tagline: "Developed R-Shiny Product Forecasting App for the M5 Forecasting Accuracy challenge on Kaggle using XGBoost, Prophet and Random Forest models."

      - title: Hierarchical Forecaster Web App (Sept 2021) - Link
        link: "https://metodisimeonov.shinyapps.io/Hierarchical_Forecaster/"
        tagline: "Developed R-Shiny Product Exploration App for the M5 Forecasting Accuracy challenge on Kaggle using an ensemble approach comprising of XGBoost and Lightgbm models."

      - title: Employee Attrition Analysis (July 2021) - Link
        link: "https://rpubs.com/MetodiSimeonov/Attrition"
        tagline: "Developed predictive analysis to target employee attrition. Used variety of tree based and ensemble models in H2O, embedded in Azure Machine Learning."

