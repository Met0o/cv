career-profile:
    title: Career Profile
    summary: |
      Senior AI and Data Science Engineer with over 15 years of experience spanning across diverse IT domains. 
      I specialize in building intelligent systems that unify classical statistical modeling with modern LLM ecosystems, enabling adaptive, explainable, and automated decision workflows. 

      My recent work focuses on architecting multi-agent platforms delivering enterprise-grade AI services. 
      
      I combine deep expertise in Python, distributed computing, and MLOps to design reliable, observable, and cloud-native solutions. 

      Having led cross-functional data teams, I excel in translating complex organizational needs into scalable architectures that balance innovation, reliability, and responsible AI governance. 
      
      Passionate about advancing practical AI, I continuously evaluate emerging tools and frameworks to deliver production-ready, secure, and high-impact intelligent systems.

