experiences:
    title: Experience
    info:
      - role: Senior Data Science Engineer
        time: 2024 - Current
        company: Mach5 Technology
        details: |
          Leading the architecture and delivery of production AI systems for Governance, Risk Management, and Compliance (GRC) products.
            - Defining the company's generative AI strategy and establishing reusable architecture for agent orchestration, MCP integration, retrieval, evaluation, and autonomous workflows across multiple products.
            - Designing secure, event-driven and interactive AI services with typed outputs, context management, authenticated tool execution, concurrency controls, and resilient failure handling.
            - Establishing production observability through OpenTelemetry, Prometheus, MLflow, structured telemetry, health canaries, usage analytics, and automated AI quality evaluation.
            - Owning engineering standards across automated testing, Docker and Helm delivery, CI/CD quality gates, dependency scanning, and container security.
            - Evaluating emerging models, protocols, and frameworks and translating them into maintainable platform capabilities.
            - Partnering with product leadership and engineering teams to translate compliance workflows into secure, scalable AI products.

      - role: Senior Data Science Engineer
        time: 2022 - 2024
        company: Prime Holding JSC
        details: |
          Led a team of 5 data engineers and scientists, harnessing LLMs and a diverse open-source stack to create novel software.
            - Pioneered the application of vector databases in conjunction with LLM based agents for retrieval-augmented generation and information retrieval.
            - Fine-tuned foundational LLMs with domain specific datasets using quantized low-rank adaptation methods (qLORA).
            - Engaged in presales activities and worked closely with prospective clients to help define their requirements and align them with tailored solutions.
            - Created detailed designs and architectural diagrams that encapsulate data strategy and methodology, ensuring a clear roadmap that is well-aligned with client objectives.
   
      - role: Data Science & Analytics Consultant
        time: 2020 - 2021
        company: Hitachi Solutions Europe
        details: |
          Worked as a full stack data scientist on variety of projects. 
            - Established pan-European practice driving the expansion of data science portfolio.
            - Participated in large-scale data migration and augmentation projects using Azure Data Factory, Synapse, and Power BI integration.
            - Used R-Shiny and Dash to integrate R and Python into containerized predictive web applications deployed to the Azure cloud. 
            - Used Azure DevOps for backlog and version (Git) control. 
            - Used Docker for application isolation and deployment.
      
      - role: Business Intelligence Developer
        time: 2020 - 2020
        company: Hewlett Packard Enterprise
        details: |
          Collaborated with the business to maintain and update critical company tools, ensuring the proper use of KPIs and metrics. Updated and automated SQL Views and SSIS packages used for data loads of millions or records.
            - Participated in the development of real-time streaming analytics solution for monitoring of Salesforce cases, orders, and escalations. Used Azure SQL DB to store live data feed from Kafka consumer, connected with direct query to a Power BI dashboard presenting instant view of the data.
            - Developed end-to-end machine learning algorithm written in R to forecast demand for one of HPE’s GreenLake strategic deals. Used combination of Kwiatkowski–Phillips–Schmidt–Shin (KPSS) and augmented Dickey–Fuller (ADF) tests to evaluate hypotheses and determine time series stationarity.
            - Developed Salesforce connector with R for on demand extraction of objects and fields using complex SOQL queries and API calls (REST & BULK) wrapped in functions, thus automating traditional salesforce reporting and data extraction for large volumes of data (+30 million rows).

      - role: Business Analyst
        time: 2018 - 2020
        company: DXC Technology
        details: |
          Analyzed organizational and business domain specific processes and systems, assessed the business model and its integration with technology within the boundary of Workplace and Mobility of Offering Delivery & Transformation.
            - Developed Power BI dashboards to monitor headcount attrition and turnover, employee distribution, skillset, and active project assignments.
            - Worked with global L5 management team to drive business decisions, leveraging data from Salesforce, SAP Business Objects, and other internal systems.

      - role: Solution Consultant
        time: 2016 - 2018
        company: Hewlett Packard Enterprise
        details: |
          Identified and validated opportunities to accelerate consumption in high potential customer accounts. Drove solution architecture in partnership with the delivery teams. Enabled the customer to envision their environment and services, while leveraging the greater DXC and partner resources (internal teams and partners).
            - Provided technology leadership for development of Future Mode of Operation solution designs and functional migration plans. Closely cooperated with Account Teams, Subject Matter Experts, Chief Engineers, Operations, Delivery and Clients.
            - Worked with financial data during pre-sales. Created cost models and revenue plans.

