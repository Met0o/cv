career-profile:
    title: Career Profile
    summary: |
      Senior Data Scientist and Data Engineer with over 10 years of experience across diverse IT domains.

      I possess hands-on expertise in designing scalable and reliable data products using tools such as Azure Synapse and Azure Data Factory, and I am adept at driving onprem and cloud data strategy.

      Having led cross-functional data teams, I excel in translating complex business requirements into technical solutions. Fueled by a passion for innovation, I have extensive experience using Python, SQL, and R to develop tools that engineer, mine, and visualize data, empowering businesses to make informed decisions.

      My commitment to fostering technical excellence encompasses evaluating emerging data technologies and ensuring that solutions maintain robust data governance and security..
education:
    title: Education
    info:
      - degree: MSc in Cognitive Sciennce
        university: New Bulgarian University
        time: 2022 - 2024
        details: |
          Specializing in Neuroscience, Cognitive Modeling, and Experimental Design.
            - Delving into the intricacies of human cognition and the underlying neural mechanisms.
            - Conducting advanced research, emphasizing on cognitive control and working memory. 
            - Utilizing electrophysiological methods to capture and analyze neural responses during cognitive tasks.
            - Handling and refining large multivariate datasets. 
            - Employing Python to process, analyze, and derive meaningful insights from complex neuroscientific data.
      - degree: BSc in Psychology
        university: New Bulgarian University
        time: 2006 - 2020
        details: |
          Thesis: Big Five personality dimensions and job satisfaction as predictors of Burnout.
            - Developed regression model in R for evaluating and testing hypotheses.
            - Highlighted Coursework: Statistics, Statistical Data Analysis, Experimental Methods, Cognitive Modeling.


