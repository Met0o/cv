career-profile:
    title: Career Profile
    summary: |
      Senior Data Scientist and Data Engineer with over 10 years of experience across diverse IT domains. 
      I possess hands-on expertise in designing scalable and reliable data products using Azure & AWS cloud stack, and I am adept at driving customer data strategies.
      
      Fueled by a passion for innovation, I have extensive experience using Python, SQL, and R to develop tools that engineer, mine, and visualize data, empowering businesses to make informed decisions.

      Having led cross-functional data teams, I excel in translating complex business requirements into technical solutions. 

      My commitment to fostering technical excellence encompasses evaluating emerging data technologies and ensuring that solutions maintain robust data governance and security.

